<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人导航主页</title>
    <style>
        /* 这里是控制网页长什么样的 CSS 代码 */
        body {
            /* 把图片变成精致的圆形头像 */
        .avatar {
            width: 100px;        /* 头像宽度 */
            height: 100px;       /* 头像高度 */
            border-radius: 50%;  /* 50%的圆角就是正圆形 */
            object-fit: cover;   /* 保证图片按比例裁剪，不会被拉伸成外星人 */
            border: 3px solid #ffffff; /* 给头像加一圈白色的描边 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* 微微的立体阴影 */
            margin-bottom: 15px; /* 和下面的大标题留出呼吸空间 */
        }

        /* 稍微调整一下音乐播放器的位置 */
        .bg-music {
            margin-top: 15px;
            height: 35px; /* 让播放器稍微矮一点，不要太抢眼 */
        }
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10vh;
        }
        .profile {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile h1 { color: #333; margin-bottom: 5px; }
        .profile p { color: #666; font-size: 14px; }
        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 按钮之间的间距 */
            width: 100%;
            max-width: 400px;
        }
        .link-btn {
            background-color: #ffffff;
            color: #333;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #eaeaea;
        }
        /* 鼠标悬停时的动画效果 */
        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            background-color: #007bff;
            color: #ffffff;
        }
    </style>
</head>
<body>

   <div class="profile">
        <img src="avatar.jpg" alt="我的头像" class="avatar">

        <h1>👋 欢迎来到我的主页</h1>
        <p>这里收藏了我最常用的工具和干货链接</p>

        <audio src="bgm.mp3" controls loop class="bg-music"></audio>
    </div>

    <div class="link-container">
        <a href="https://github.com" class="link-btn" target="_blank">💻 我的 GitHub</a>
        <a href="https://www.google.com" class="link-btn" target="_blank">🔍 常用搜索引擎</a>
        <a href="https://www.bilibili.com" class="link-btn" target="_blank">📺 哔哩哔哩</a>
        </div>

</body>
</html>
